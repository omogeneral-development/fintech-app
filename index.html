<!DOCTYPE html>
<html>
<head>
  <title>Fintech Firebase Test</title>
</head>

<body style="background:#0f172a;color:white;text-align:center;font-family:Arial;">

<h1>Fintech App</h1>

<div>
  <h2>Register</h2>
  <input id="regEmail" placeholder="Email"><br><br>
  <input id="regPass" type="password" placeholder="Password"><br><br>
  <button onclick="registerUser()">Register</button>
</div>

<hr>

<div>
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email"><br><br>
  <input id="loginPass" type="password" placeholder="Password"><br><br>
  <button onclick="loginUser()">Login</button>
</div>

<hr>

<h3 id="status">Not logged in</h3>

</body>

  <script type="module">

// Firebase core
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

// AUTH (login/register)
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

// FIRESTORE (database)
import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// ANALYTICS (optional)
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";

// 🔥 YOUR CONFIG (KEEP THIS EXACT)
const firebaseConfig = {
  apiKey: "AIzaSyB20bVYVMK-IhfuCDRkXsgLa6NYeviGXYc",
  authDomain: "my-app-4d173.firebaseapp.com",
  projectId: "my-app-4d173",
  storageBucket: "my-app-4d173.appspot.com",
  messagingSenderId: "773439981351",
  appId: "1:773439981351:web:459bde641a0d2a67ef0b02",
  measurementId: "G-EJFG18HJXY"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const analytics = getAnalytics(app);

// ================= DEBUG CHECK =================
console.log("Firebase Loaded Successfully 🚀");

// ================= AUTH FUNCTIONS =================
window.register = async function(email, password){
  const user = await createUserWithEmailAndPassword(auth, email, password);

  await setDoc(doc(db, "users", user.user.uid), {
    email: email,
    balance: 200,
    createdAt: new Date()
  });

  alert("Account created 🚀");
}

window.login = async function(email, password){
  const user = await signInWithEmailAndPassword(auth, email, password);
  alert("Login successful ✅ " + user.user.email);
}

window.logout = function(){
  signOut(auth);
}

// ================= AUTO LOGIN CHECK =================
onAuthStateChanged(auth, (user)=>{
  if(user){
    console.log("User logged in:", user.email);
  } else {
    console.log("No user logged in");
  }
});

  </script>


</body>
</html>
